# ============================================================
# Exact file location: alembic.ini
# Horseshoe Tavern AI
# Phase 2 Part 2.1
# Alembic migration configuration
# ============================================================

[alembic]
script_location = app/database/migrations
prepend_sys_path = .
path_separator = os

# The effective URL is resolved dynamically by migrations/env.py.
# This local value is a safe development fallback.
sqlalchemy.url = sqlite:///./horseshoe_tavern_ai.db

file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s
truncate_slug_length = 60

revision_environment = false
sourceless = false
version_path_separator = os
output_encoding = utf-8

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
